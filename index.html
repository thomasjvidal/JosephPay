<script type="text/babel" data-presets="react">

const SUPABASE_URL  = "https://ljpjadwvqocatnqjvuvk.supabase.co";   // ex: "https://xyzxyz.supabase.co"
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqcGphZHd2cW9jYXRucWp2dXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTg4MzgsImV4cCI6MjA5MTg5NDgzOH0.cflTLbryotX4p84pA2L03J1VHmVCELTvJ0WwI5WeZeY";   // ex: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
const _sb = (SUPABASE_URL && SUPABASE_ANON && typeof supabase !== "undefined")
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
  : null;

// ── Railway + helpers ────────────────────────────────────────────────────────
const RAILWAY="https://josephpay-production.up.railway.app";
const fmtBRL=(v)=>`R$ ${Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const getToken=async()=>{if(!_sb)return null;const{data:{session}}=await _sb.auth.getSession();return session?.access_token||null;};
const apiCall=async(path,opts={})=>{try{const token=await getToken();const res=await fetch(`${RAILWAY}${path}`,{...opts,headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})},body:opts.body});return await res.json();}catch(e){console.error("[api]",path,e.message);return{error:e.message};}};
// ─────────────────────────────────────────────────────────────────────────────

const GOLD="#D4AF37", GOLD2="#F2CA50", GREEN="#22C55E", RED="#EF4444", BLUE="#5B8DEF";
const BG="#131312", CARD="#1C1C1A", CARD2="#20201E", CARD3="#2A2A29";
const BDR="rgba(255,255,255,0.06)", MUTED="#B0A894", TEXT="#F2EFEA";
const F="'Inter',system-ui,sans-serif", SF="'Newsreader',Georgia,serif";

const mkData=(n,base,variance)=>Array.from({length:n},(_,i)=>({i,v:Math.max(0,base+Math.floor((Math.random()-0.4)*variance))}));
const PERIODS={
  hoje:{data:mkData(8,320,300).map((d,i)=>({...d,label:`${8+i}h`})),label:"Hoje"},
  semana:{data:mkData(7,800,700).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]})),label:"Esta semana"},
  mes:{data:mkData(30,600,800).map((d,i)=>({...d,label:i+1})),label:"Este mês"},
  trimestre:{data:mkData(12,2000,2000).map((d,i)=>({...d,label:`S${i+1}`})),label:"Trimestre"},
  ano:{data:mkData(12,8000,6000).map((d,i)=>({...d,label:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][i]})),label:"Ano"},
};

function Tag({status}){
  if(status==="pago") return <span style={{fontSize:10,fontWeight:600,color:"#22C55E",letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  if(status==="pendente") return <span style={{fontSize:10,fontWeight:600,color:MUTED,letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  if(status==="estornado") return <span style={{fontSize:10,fontWeight:600,color:RED,letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  const m={cancelado:{bg:"rgba(255,68,68,0.1)",tx:RED,bd:"rgba(255,68,68,0.2)"},ativo:{bg:`${GOLD}18`,tx:GOLD,bd:`${GOLD}30`},inativo:{bg:"rgba(255,68,68,0.1)",tx:RED,bd:"rgba(255,68,68,0.2)"}};
  const s=m[status]||{bg:"rgba(255,255,255,0.07)",tx:MUTED,bd:BDR};
  return <span style={{background:s.bg,color:s.tx,border:`1px solid ${s.bd}`,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:"0.06em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{status}</span>;
}

function KPICard({label,value,sub,accent,icon,vis=true}){

    <div style={{background:CARD,border:`1px solid rgba(212,175,55,0.06)`,borderRadius:16,padding:"20px 16px"}}>

        <span style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.09em",textTransform:"uppercase",fontFamily:F}}>{label}</span>
        <span style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${c}30`,background:`${c}0D`,display:"flex",alignItems:"center",justifyContent:"center",color:c,fontSize:12,flexShrink:0}}>{icon}</span>
      </div>
      <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:20,letterSpacing:"-0.01em"}}>{vis?value:"••••••"}</div>

function Pill({label,value,accent,sub}){

    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:18,padding:"18px 16px",flex:1,minWidth:0}}>

function Btn({children,onClick,color,outline,sm}){
  const c=color||GOLD;
  return(
    <button onClick={onClick} style={{background:outline?"transparent":c,border:`1.5px solid ${outline?c+"70":"transparent"}`,borderRadius:100,padding:sm?"8px 22px":"15px 28px",color:outline?c:(c===GOLD?"#0C0C0C":TEXT),fontWeight:600,fontSize:sm?13:14,cursor:"pointer",width:(outline||sm)?"auto":"100%",fontFamily:F,letterSpacing:"0.01em"}}>
      {children}
    </button>
  );
}

function aggregateChartData(sales,period){
  const now=new Date();
  if(period==="hoje"){
    const hrs=Array.from({length:8},(_,i)=>({label:`${String(6+i*2).padStart(2,'0')}h`,v:0}));
    (sales||[]).forEach(s=>{const h=new Date(s.created_at).getHours();const slot=Math.floor((h-6)/2);if(slot>=0&&slot<8)hrs[slot].v+=Number(s.amount);});
    return hrs;
  }
  if(period==="semana"){
    const days=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].map(l=>({label:l,v:0}));
    (sales||[]).forEach(s=>{const d=(new Date(s.created_at).getDay()+6)%7;days[d].v+=Number(s.amount);});
    return days;
  }
  if(period==="mes"){
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const days=Array.from({length:dim},(_,i)=>({label:i+1,v:0}));
    (sales||[]).forEach(s=>{const d=new Date(s.created_at).getDate()-1;if(d>=0&&d<dim)days[d].v+=Number(s.amount);});
    return days;
  }
  if(period==="trimestre"){
    const mLabels=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const qStartMonth=Math.floor(now.getMonth()/3)*3;
    const qMonths=[0,1,2].map(i=>({label:mLabels[qStartMonth+i],v:0}));
    (sales||[]).forEach(s=>{const m=new Date(s.created_at).getMonth()-qStartMonth;if(m>=0&&m<3)qMonths[m].v+=Number(s.amount);});
    return qMonths;
  }
  const months=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].map(l=>({label:l,v:0}));
  (sales||[]).forEach(s=>{const m=new Date(s.created_at).getMonth();months[m].v+=Number(s.amount);});
  return months;
}

function AdvancedChart({accent=GOLD,vis=true,endpoint}){
  const [period,setPeriod]=useState("mes");
  // Se tem endpoint, começa em "carregando" (undefined) para nunca mostrar dados fake
  // Se não tem endpoint (modo demo/fallback), começa em null → usa PERIODS
  const [apiSales,setApiSales]=useState(endpoint?undefined:null);
  useEffect(()=>{
    if(!endpoint){setApiSales(null);return;}
    setApiSales(undefined);
    apiCall(`${endpoint}?period=${period}`).then(d=>{setApiSales(d?.sales||[]);});
  },[period,endpoint]);
  // chartData só usa PERIODS se não tiver endpoint E apiSales for null
  const chartData=apiSales!=null?aggregateChartData(apiSales,period):(endpoint?[]:PERIODS[period].data);
  const total=chartData.reduce((a,d)=>a+d.v,0);
  const pd=PERIODS[period];
  const gid=`g-${period}-${accent.replace("#","")}`;
  return(
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"16px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{color:MUTED,fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:F}}>{pd.label}</div>
          <div style={{color:accent,fontFamily:SF,fontWeight:600,fontSize:22,letterSpacing:"-0.01em"}}>{vis?fmtBRL(total):"R$ ••••••"}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,marginBottom:8,scrollbarWidth:"none",msOverflowStyle:"none",WebkitOverflowScrolling:"touch"}} className="hide-scroll">
        {Object.keys(PERIODS).map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 11px",borderRadius:100,border:`1px solid ${p===period?accent+"50":BDR}`,background:p===period?`${accent}15`:"transparent",color:p===period?accent:MUTED,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F,whiteSpace:"nowrap",flexShrink:0}}>{p}</button>
        ))}
      </div>
      {apiSales===undefined&&<div style={{height:100,display:"flex",alignItems:"center",justifyContent:"center",color:MUTED,fontSize:12}}>Carregando…</div>}
      {apiSales!==undefined&&<div style={{height:100}}>
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={chartData} margin={{top:4,right:4,left:-32,bottom:0}}>
            <defs>
              <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={accent} stopOpacity={0.18}/>
                <stop offset="100%" stopColor={accent} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.03)" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:MUTED,fontSize:9,fontFamily:F}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
            <YAxis hide/>
            <Tooltip contentStyle={{background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,color:"#fff",fontSize:12,fontFamily:F}} formatter={v=>[fmtBRL(v),"Receita"]} labelStyle={{color:MUTED,fontSize:10}}/>
            <Area type="monotone" dataKey="v" stroke={accent} strokeWidth={2} fill={`url(#${gid})`} dot={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>}
    </div>
  );
}

function VisitorChart(){
  const data=mkData(7,120,150).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]}));

const QQ=["📊 Vendas hoje?","💰 Receita da semana?","🔗 Gerar link de afiliado","📈 Minha conversão?","❓ Configurar checkout","🆘 Suporte"];
// AR removido — chat IA sempre chama a API real (Anthropic), respostas hardcoded não são usadas

function ChatIA({productName, onBack}){
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [showQ,setShowQ]=useState(true);
  const [sending,setSending]=useState(false);
  const bottom=useRef(null);
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  const send=async(text)=>{
    const msg=text||input;if(!msg.trim()||sending)return;
    setInput("");setShowQ(false);setSending(true);
    const newMsgs=[...msgs,{role:"user",text:msg}];
    setMsgs(newMsgs);
    try{
      const data=await apiCall('/api/chat',{method:'POST',body:JSON.stringify({
        messages:newMsgs.map(m=>({role:m.role==='ai'?'assistant':m.role,content:m.text})),
        productContext:productName
      })});
      setMsgs(p=>[...p,{role:"ai",text:data.reply||"Erro ao processar resposta."}]);
    }catch(e){
      setMsgs(p=>[...p,{role:"ai",text:"Erro de conexão. Verifique sua internet e tente novamente."}]);
    }
    setSending(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 150px)",minHeight:380}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:MUTED,fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:600,fontFamily:F}}>← Voltar para o Início</button>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"76%",padding:"11px 15px",borderRadius:16,fontSize:13,lineHeight:1.55,background:m.role==="user"?`${GOLD}18`:"rgba(255,255,255,0.05)",color:TEXT,border:`1px solid ${m.role==="user"?GOLD+"30":BDR}`}}>{m.text}</div>
          </div>
        ))}
        {showQ&&(
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
            <div style={{color:MUTED,fontSize:11,marginBottom:2}}>Perguntas rápidas:</div>
            {QQ.map(q=>(
              <button key={q} onClick={()=>send(q)} style={{textAlign:"left",padding:"10px 14px",borderRadius:12,background:CARD,border:`1px solid ${BDR}`,color:"rgba(255,255,255,0.75)",fontSize:13,cursor:"pointer",fontWeight:500,fontFamily:F}}>{q}</button>
            ))}
          </div>
        )}
        {sending&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{padding:"11px 16px",borderRadius:16,background:"rgba(255,255,255,0.05)",border:`1px solid ${BDR}`,color:MUTED,fontSize:13}}>✦ digitando…</div></div>}
        <div ref={bottom}/>
      </div>
      <div style={{display:"flex",gap:8,flexShrink:0,paddingBottom:20}}>

    apiCall('/api/dashboard/kpis').then(d=>{if(d&&!d.error)setKpis(d);});

function Vendas({accent=GOLD,isDeise}){
  const [sales,setSales]=useState(null);
  useEffect(()=>{
    if(!_sb)return;
    _sb.from('sales').select('*,customers(name)').order('created_at',{ascending:false}).limit(50)
      .then(({data})=>{if(data)setSales(data);});
  },[]);
  const receita=(sales||[]).filter(s=>s.status==='pago').reduce((a,s)=>a+Number(s.amount),0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:TEXT,fontWeight:800,fontSize:17,marginBottom:2}}>Vendas</div>
      <div className="two-col">
        <Pill label="Total vendas" value={sales?String(sales.length):"—"} accent={accent}/>
        <Pill label="Receita" value={sales?fmtBRL(receita):"—"} accent={GOLD}/>
      </div>
      <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
        {sales===null&&<div style={{padding:"20px",color:MUTED,fontSize:13,textAlign:"center"}}>Carregando…</div>}
        {sales!==null&&sales.length===0&&<div style={{padding:"20px",color:MUTED,fontSize:13,textAlign:"center"}}>Nenhuma venda registrada ainda.</div>}
        {(sales||[]).map((s,i)=>{
          const nome=s.customers?.name||"Cliente";
          const dt=new Date(s.created_at).toLocaleDateString('pt-BR');
          return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:i<(sales.length-1)?`1px solid ${BDR}`:"none"}}>
            <div style={{width:38,height:38,borderRadius:12,background:CARD2,border:`1px solid ${BDR}`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:TEXT,flexShrink:0}}>{nome[0]}</div>
            <div style={{flex:1}}><div style={{color:TEXT,fontWeight:600,fontSize:13}}>{nome}</div><div style={{color:MUTED,fontSize:11,marginTop:2}}>{dt}</div></div>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <div style={{color:TEXT,fontWeight:700,fontSize:13}}>{fmtBRL(s.amount)}</div>
              <Tag status={s.status}/>
            </div>
          </div>
          );
        })}
      </div>
    </div>
  );
}

function CriarProdutoModal({onClose,onCreated}){
  const [nome,setNome]=useState("");
  const [preco,setPreco]=useState("");
  const [desc,setDesc]=useState("");
  const [tipo,setTipo]=useState("UNDEFINED");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [created,setCreated]=useState(false); // boolean — produto foi criado
  const [link,setLink]=useState("");           // URL do checkout (pode ser vazia)
  const [copied,setCopied]=useState(false);
  const criar=async()=>{
    if(!nome||!preco){setError("Preencha nome e preço.");return;}
    setError("");setLoading(true);
    const val=parseFloat(preco.replace(/\./g,"").replace(",","."));
    if(isNaN(val)||val<=0){setError("Preço inválido.");setLoading(false);return;}
    const d=await apiCall('/api/products/create',{method:'POST',body:JSON.stringify({name:nome,description:desc,price:val,billingType:tipo})});
    setLoading(false);
    if(d.error){setError(d.error);return;}
    if(!d.paymentUrl){setError("Link não foi gerado. Verifique os logs do Railway e tente novamente.");return;}
    setLink(d.paymentUrl);
    setCreated(true);
    if(onCreated) onCreated();
  };
  const copiar=()=>{
    if(!link)return;
    navigator.clipboard?.writeText(link).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,margin:"0 auto",background:CARD,borderRadius:"24px 24px 0 0",padding:"12px 24px 40px",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:32,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)",margin:"0 auto 20px"}}/>
        {created?(
          <div style={{textAlign:"center",padding:"20px 0 10px"}}>
            <div style={{color:GREEN,fontSize:40,marginBottom:12}}>✓</div>
            <div style={{color:TEXT,fontWeight:800,fontSize:18,marginBottom:8}}>Produto criado!</div>
            <div style={{color:MUTED,fontSize:13,marginBottom:20}}>Já aparece na sua lista de produtos.</div>
            {link?(
              <div style={{background:CARD2,border:`1px solid ${BDR}`,borderRadius:14,padding:"14px 16px",marginBottom:20}}>
                <div style={{color:MUTED,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Link de checkout</div>
                <div style={{color:GOLD,fontSize:12,fontWeight:600,wordBreak:"break-all",marginBottom:12,lineHeight:1.5}}>{link}</div>
                <button onClick={copiar} style={{width:"100%",background:copied?`${GREEN}18`:GOLD,border:copied?`1px solid ${GREEN}40`:"none",borderRadius:100,padding:"12px",color:copied?GREEN:"#0C0C0C",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:F,transition:"all 0.2s"}}>
                  {copied?"✓ Copiado!":"Copiar link"}
                </button>
              </div>
            ):(
              <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${BDR}`,borderRadius:14,padding:"14px 16px",marginBottom:20}}>
                <div style={{color:MUTED,fontSize:13}}>Link sendo gerado… veja em Gerenciar produto.</div>
              </div>
            )}
            <button onClick={onClose} style={{width:"100%",background:"transparent",border:`1.5px solid ${BDR}`,borderRadius:100,padding:14,color:MUTED,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:F}}>Fechar</button>
          </div>
        ):(
          <>
            <div style={{color:TEXT,fontWeight:800,fontSize:18,marginBottom:20}}>Novo produto</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Nome do produto *</div>
                <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Protocolo G9" style={{width:"100%",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,padding:"13px 14px",color:TEXT,fontSize:15,outline:"none",fontFamily:F}}/>
              </div>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Preço (R$) *</div>
                <div style={{display:"flex",alignItems:"center",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12}}>
                  <span style={{padding:"0 14px",color:GOLD,fontWeight:700,fontSize:16}}>R$</span>
                  <input value={preco} onChange={e=>setPreco(e.target.value)} placeholder="0,00" style={{flex:1,background:"none",border:"none",padding:"13px 14px 13px 0",color:TEXT,fontSize:15,outline:"none",fontFamily:F}}/>
                </div>
              </div>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Descrição (opcional)</div>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descreva o produto..." rows={3} style={{width:"100%",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,padding:"13px 14px",color:TEXT,fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Tipo de cobrança</div>
                <select value={tipo} onChange={e=>setTipo(e.target.value)} style={{width:"100%",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,padding:"13px 14px",color:TEXT,fontSize:14,outline:"none",fontFamily:F,appearance:"none"}}>
                  <option value="UNDEFINED">Pagamento único (PIX, Cartão, Boleto)</option>
                  <option value="RECURRENT">Assinatura recorrente (mensal)</option>
                </select>
              </div>
              {error&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"10px 14px",color:RED,fontSize:13}}>{error}</div>}
              <button onClick={criar} disabled={loading} style={{background:loading?"rgba(212,175,55,0.4)":GOLD,border:"none",borderRadius:100,padding:14,color:"#0C0C0C",fontWeight:700,fontSize:14,cursor:loading?"not-allowed":"pointer",fontFamily:F}}>{loading?"Criando…":"Criar produto →"}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

  const [showNovo,setShowNovo]=useState(false);
  const [showCriar,setShowCriar]=useState(false);
  const [produtos,setProdutos]=useState(null);
  const [refresh,setRefresh]=useState(0);
  const [copiedIdx,setCopiedIdx]=useState(null);
  const handleDelete=async(id)=>{
    if(!window.confirm("Excluir este produto e recriar?"))return;
    await apiCall(`/api/products/${id}`,{method:"DELETE"});
    setRefresh(r=>r+1);
  };
  useEffect(()=>{
    apiCall('/api/products').then(d=>{
      if(d?.products) setProdutos(d.products);
      else setProdutos([]);
    });
  },[refresh]);
  if(sel!==null&&produtos) return <ProdutoDetalhe produto={produtos[sel]} onBack={()=>setSel(null)} isDeise={isDeise} accent={accent}/>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {showCriar&&<CriarProdutoModal onClose={()=>setShowCriar(false)} onCreated={()=>setRefresh(r=>r+1)}/>}

      </div>
      {produtos===null&&<div style={{color:MUTED,fontSize:13,textAlign:"center",padding:"20px 0"}}>Carregando…</div>}
      {produtos!==null&&produtos.length===0&&<div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"28px",textAlign:"center",color:MUTED,fontSize:13}}>Nenhum produto ainda. Crie o seu primeiro! →</div>}
      {(produtos||[]).map((p,i)=>(
        <div key={i} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden",borderLeft:`4px solid ${GREEN}`}}>
          <div style={{height:90,background:"linear-gradient(135deg,#1C1C1A 0%,#2A2500 60%,#1A1800 100%)",position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:32,color:GOLD,opacity:0.7}}>◈</span>
          </div>
          <div style={{padding:"20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{color:TEXT,fontWeight:800,fontSize:18,letterSpacing:"-0.01em"}}>{p.name}</div>
                  <Tag status={p.status||"ativo"}/>
                </div>
                {p.url?(
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                    <span style={{color:MUTED,fontSize:12,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>🔗 {p.url}</span>
                    <button onClick={e=>{e.stopPropagation();navigator.clipboard?.writeText(p.url).then(()=>{setCopiedIdx(i);setTimeout(()=>setCopiedIdx(null),2000);});}} style={{flexShrink:0,background:copiedIdx===i?`${GREEN}18`:"rgba(212,175,55,0.12)",border:copiedIdx===i?`1px solid ${GREEN}40`:`1px solid ${GOLD}30`,borderRadius:20,padding:"3px 10px",color:copiedIdx===i?GREEN:GOLD,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:F,whiteSpace:"nowrap",transition:"all 0.2s"}}>{copiedIdx===i?"✓ Copiado":"Copiar link"}</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                    <span style={{color:"rgba(239,68,68,0.6)",fontSize:11,fontFamily:F}}>🔗 Link não gerado</span>
                    <button onClick={e=>{e.stopPropagation();handleDelete(p.id);}} style={{background:"transparent",border:"1px solid rgba(239,68,68,0.3)",borderRadius:20,padding:"2px 10px",color:"rgba(239,68,68,0.7)",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:F}}>Excluir e recriar</button>
                  </div>
                )}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,paddingBottom:20,borderBottom:`1px solid ${BDR}`}}>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:F}}>Receita (mês)</div>
                <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:28,lineHeight:1,letterSpacing:"-0.02em"}}>{fmtBRL(p.receitaMes||0)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:F}}>Vendas</div>
                <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:20,lineHeight:1}}>{p.totalVendas||0}</div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:F}}>Afiliados</div>
                <div style={{color:TEXT,fontWeight:600,fontSize:16}}>{p.afiliadosAtivos||0}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:F}}>Assinaturas</div>
                <div style={{color:TEXT,fontWeight:600,fontSize:16}}>{p.assinaturasAtivas||0}</div>
              </div>
            </div>
            <button onClick={()=>setSel(i)} style={{width:"100%",background:TEXT,border:"none",borderRadius:100,padding:"14px",color:BG,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:F,transition:"transform 0.2s",letterSpacing:"0.01em"}}>Gerenciar Produto</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AutomacoesZap(){
  const [wapStatus,setWapStatus]=useState("verificando");
  useEffect(()=>{
    apiCall('/api/whatsapp/status').then(d=>{setWapStatus(d?.connected?"conectado":"desconectado");}).catch(()=>setWapStatus("desconectado"));
  },[]);
  const [anivOn,setAnivOn]=useState(true);
  const [anivMsg,setAnivMsg]=useState("Feliz aniversário, {nome}! 🎂 Aqui vai um presentinho especial para você.");
  const [cashOn,setCashOn]=useState(false);
  const [cashDias,setCashDias]=useState("7");
  const [cashMsg,setCashMsg]=useState("Oi {nome}, você tem cashback esperando! Use hoje.");
  const [posOn,setPosOn]=useState(true);
  const [posDias,setPosDias]=useState("3");
  const [posMsg,setPosMsg]=useState("Olá {nome}! Como foi sua experiência? Posso te oferecer algo mais?");
  function Toggle({on,setOn}){
    return(
      <button onClick={()=>setOn(!on)} style={{width:44,height:24,borderRadius:100,background:on?GOLD:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
        <div style={{width:18,height:18,borderRadius:"50%",background:on?"#0C0C0C":"rgba(255,255,255,0.4)",position:"absolute",top:3,left:on?23:3,transition:"left 0.2s"}}/>
      </button>
    );
  }
  function AutoBlock({title,on,setOn,dias,setDias,msg,setMsg,showDias}){
    return(
      <div style={{background:CARD,border:`1px solid ${on?GOLD+"30":BDR}`,borderRadius:18,padding:"18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:on?14:0}}>
          <div>
            <div style={{color:TEXT,fontWeight:700,fontSize:14}}>{title}</div>
            <div style={{color:MUTED,fontSize:11,marginTop:2}}>{on?"Ativo":"Inativo"}</div>
          </div>
          <Toggle on={on} setOn={setOn}/>
        </div>
        {on&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {showDias&&(
              <div>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Dias após a compra</div>
                <input value={dias} onChange={e=>setDias(e.target.value)} style={{width:"100%",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,padding:"10px 14px",color:TEXT,fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
            )}
            <div>
              <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Mensagem</div>
              <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={3} style={{width:"100%",background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,padding:"10px 14px",color:TEXT,fontSize:13,outline:"none",fontFamily:F,lineHeight:1.5}}/>
            </div>
          </div>
        )}
      </div>
    );
  }
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`${wapStatus==="conectado"?GREEN:RED}0D`,border:`1px solid ${wapStatus==="conectado"?GREEN:RED}25`,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:wapStatus==="conectado"?GREEN:RED,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{color:MUTED,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>WhatsApp</div>
          <div style={{color:TEXT,fontSize:13,fontWeight:600}}>{wapStatus==="conectado"?"Conectado e pronto":"Desconectado"}</div>
        </div>
        {wapStatus==="conectado"&&<span style={{background:`${GREEN}15`,color:GREEN,border:`1px solid ${GREEN}28`,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>Online</span>}
      </div>
      <AutoBlock title="Mensagem de Aniversário" on={anivOn} setOn={setAnivOn} msg={anivMsg} setMsg={setAnivMsg} showDias={false}/>
      <AutoBlock title="Cashback" on={cashOn} setOn={setCashOn} dias={cashDias} setDias={setCashDias} msg={cashMsg} setMsg={setCashMsg} showDias={true}/>
      <AutoBlock title="Pós-compra" on={posOn} setOn={setPosOn} dias={posDias} setDias={setPosDias} msg={posMsg} setMsg={setPosMsg} showDias={true}/>
    </div>
  );
}

// ClientesCRM removido — substituído por PainelClientesTab com dados reais do Supabase

function PainelClientesTab({targetCustomerId}){
  const [clientes,setClientes]=useState(null);
  const [sel,setSel]=useState(null);
  useEffect(()=>{
    if(!_sb)return;
    _sb.from('customers').select('*,sales(amount,status,created_at,products(name))').order('created_at',{ascending:false})
      .then(({data})=>{if(data)setClientes(data);});
  },[]);
  useEffect(()=>{
    if(targetCustomerId&&clientes){
      const idx=clientes.findIndex(c=>c.id===targetCustomerId);
      if(idx!==-1)setSel(idx);
    }
  },[targetCustomerId,clientes]);

  // Calcula aniversários próximos (30 dias)
  const today=new Date();
  const anivs=(clientes||[]).filter(c=>c.birthday).map(c=>{
    const b=new Date(c.birthday);
    const next=new Date(today.getFullYear(),b.getMonth(),b.getDate());
    if(next<today)next.setFullYear(today.getFullYear()+1);
    const dias=Math.round((next-today)/(1000*60*60*24));
    return{name:c.name,data:`${String(b.getDate()).padStart(2,'0')}/${String(b.getMonth()+1).padStart(2,'0')}`,dias};
  }).filter(a=>a.dias<=60).sort((a,b)=>a.dias-b.dias).slice(0,5);

  if(sel!==null&&clientes){
    const c=clientes[sel];
    const compras=(c.sales||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const lastSale=compras[0];
    const ultimaCompra=lastSale?new Date(lastSale.created_at).toLocaleDateString('pt-BR'):"—";
    const anivFmt=c.birthday?new Date(c.birthday).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):"—";
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:MUTED,fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:600,fontFamily:F}}>← Voltar para clientes</button>
        <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"20px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
            <div style={{width:48,height:48,borderRadius:16,background:CARD3,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,color:TEXT,flexShrink:0}}>{c.name[0]}</div>
            <div style={{flex:1}}>
              <div style={{color:TEXT,fontWeight:800,fontSize:17}}>{c.name}</div>
              <div style={{color:MUTED,fontSize:12,marginTop:2}}>📱 {c.phone||"—"}</div>
              {c.email&&<div style={{color:MUTED,fontSize:12,marginTop:1}}>✉ {c.email}</div>}
              {c.birthday&&<div style={{color:MUTED,fontSize:12,marginTop:1}}>🎂 Aniversário: {anivFmt}</div>}
            </div>
            <Tag status={lastSale?"ativo":"inativo"}/>
          </div>
          <span style={{background:`${GOLD}14`,color:GOLD,border:`1px solid ${GOLD}28`,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20}}>Última compra: {ultimaCompra}</span>
        </div>
        <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${BDR}`}}><span style={{color:TEXT,fontWeight:700,fontSize:14}}>Histórico de compras</span></div>
          {compras.length===0&&<div style={{padding:"16px 18px",color:MUTED,fontSize:13}}>Nenhuma compra registrada.</div>}
          {compras.map((cp,i)=>{
            const prod=cp.products?.name||"Produto";
            const dt=new Date(cp.created_at).toLocaleDateString('pt-BR');
            return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",borderBottom:i<compras.length-1?`1px solid ${BDR}`:"none"}}>
              <div style={{flex:1}}><div style={{color:TEXT,fontWeight:600,fontSize:13}}>{prod}</div><div style={{color:MUTED,fontSize:11,marginTop:2}}>{dt}</div></div>
              <div style={{textAlign:"right"}}><div style={{color:TEXT,fontWeight:700,fontSize:13}}>{fmtBRL(cp.amount)}</div><div style={{marginTop:4}}><Tag status={cp.status}/></div></div>
            </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="kpi-grid">
        <KPICard label="Msgs hoje" value="—" icon="✉" accent={GOLD}/>
        <KPICard label="Msgs este mês" value="—" icon="✉" accent={GOLD}/>
        <KPICard label="Total clientes" value={clientes?String(clientes.length):"—"} icon="◻" accent={GOLD}/>
        <KPICard label="Clientes ativos" value={clientes?String(clientes.length):"—"} icon="◉" accent={GOLD}/>
      </div>
      
      <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",borderBottom:`1px solid ${BDR}`}}>
          <span style={{color:TEXT,fontWeight:700,fontSize:14}}>Próximos aniversários</span>
        </div>
        {anivs.map((a,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",borderBottom:i<anivs.length-1?`1px solid ${BDR}`:"none"}}>
            <span style={{fontSize:18,flexShrink:0}}>🎂</span>
            <div style={{flex:1}}>
              <div style={{color:TEXT,fontWeight:600,fontSize:13}}>{a.name}</div>
              <div style={{color:MUTED,fontSize:11,marginTop:2}}>{a.data}</div>
            </div>
            {a.dias<=30&&<span style={{background:`${GOLD}18`,color:GOLD,border:`1px solid ${GOLD}30`,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{a.dias} dias</span>}
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4,marginBottom:12}}>
        <Btn sm outline color={GOLD}>+ Adicionar</Btn>
        <button style={{background:"transparent",border:`1.5px solid ${BDR}`,borderRadius:100,padding:"8px 18px",color:MUTED,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:F}}>Importar</button>
        <button style={{background:"transparent",border:`1.5px solid ${BDR}`,borderRadius:100,padding:"8px 18px",color:MUTED,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:F}}>Exportar</button>
      </div>

      {/* Lista de Clientes */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{color:TEXT,fontWeight:800,fontSize:17}}>Lista de Clientes</div>
        {clientes===null&&<div style={{color:MUTED,fontSize:13,textAlign:"center",padding:"20px 0"}}>Carregando…</div>}
        {clientes!==null&&clientes.length===0&&<div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:18,padding:"24px",textAlign:"center",color:MUTED,fontSize:13}}>Nenhum cliente cadastrado ainda.</div>}
        {(clientes||[]).map((c,i)=>{
          const lastSale=c.sales?.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
          const ultimaCompra=lastSale?new Date(lastSale.created_at).toLocaleDateString('pt-BR'):"—";
          const anivFmt=c.birthday?new Date(c.birthday).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):"—";
          return(
          <button key={i} onClick={()=>setSel(i)} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:18,padding:"16px 18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14,width:"100%"}}>
            <div style={{width:42,height:42,borderRadius:13,background:CARD3,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:17,color:TEXT,flexShrink:0}}>{c.name[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{color:TEXT,fontWeight:700,fontSize:14}}>{c.name}</div>
                <Tag status={lastSale?"ativo":"inativo"}/>
              </div>
              <div style={{color:MUTED,fontSize:12}}>📱 {c.phone||c.email||"—"}</div>
              <div style={{display:"flex",gap:12,marginTop:2}}>
                <span style={{color:MUTED,fontSize:11}}>Última compra: <span style={{color:TEXT}}>{ultimaCompra}</span></span>
                {c.birthday&&<span style={{color:MUTED,fontSize:11}}>🎂 {anivFmt}</span>}
              </div>
            </div>
          </button>
          );
        })}
      </div>
    </div>
  );
}

                <span style={{color:MUTED,fontSize:11,width:28,textAlign:"right",flexShrink:0}}>{r.w}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{color:MUTED,fontSize:12,textAlign:"center"}}>📊 Baseado em 47 avaliações Google</div>
      </div>
    </div>
  );
}

function Login({onLogin}){
  const [role,setRole]=useState(null);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [resetSent,setResetSent]=useState(false);
  const CLIENTS=[{name:"Renato G9",email:"renato@g9.com"},{name:"Dra. Deise",email:"deise@clinica.com"}];
  const isAdminMode=typeof window!=="undefined"&&(window.location.search.includes("admin=1") || window.location.pathname.includes("/admin"));

  const doLogin=async()=>{
    if(!email||!pass){setError("Preencha e-mail e senha.");return;}
    setError("");setLoading(true);
    if(_sb){
      const{data,error:err}=await _sb.auth.signInWithPassword({email,password:pass});
      setLoading(false);
      if(err){setError(err.message==="Invalid login credentials"?"E-mail ou senha incorretos.":err.message);return;}
      const meta=data.user.user_metadata||{};
      onLogin({role:meta.role||(role==="admin"?"admin":"client"),name:meta.name||email.split("@")[0],email,id:data.user.id});
    } else {
      // Demo mode — funciona sem Supabase configurado
      setTimeout(()=>{
        setLoading(false);
        if(role==="admin"){onLogin({role:"admin",name:"Joseph",email});}
        else{const m=CLIENTS.find(c=>c.email.toLowerCase()===email.toLowerCase())||CLIENTS[0];onLogin({role:"client",name:m.name,email});}
      },600);
    }
  };

  const doReset=async()=>{
    if(!email){setError("Digite seu e-mail antes de recuperar a senha.");return;}
    setError("");
    if(_sb){
      await _sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
      setResetSent(true);
    } else {
      setError("Configure o Supabase para usar recuperação de senha.");
    }
  };
  return(
    <div style={{background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:0}}>
      <div style={{width:"100%",maxWidth:480,position:"relative",height:220,overflow:"hidden",flexShrink:0}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#1a1500 0%,#2d2200 30%,#1a1200 60%,#0d0d0c 100%)"}}/>
        <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 60% 40%,${GOLD}22 0%,transparent 65%)`}}/>
        <div style={{position:"absolute",inset:0,background:`linear-gradient(to bottom, transparent 0%, ${BG} 100%)`}}/>
          <div style={{position:"absolute",bottom:24,left:0,right:0,textAlign:"center"}}>
            <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:36,letterSpacing:"-0.01em",lineHeight:1.1}}>Joseph<span style={{color:GOLD}}>Pay</span></div>
          <div style={{width:40,height:1,background:`linear-gradient(90deg,transparent,${GOLD}80,transparent)`,margin:"12px auto"}}/>
          <div style={{color:MUTED,fontSize:13,fontFamily:F,fontWeight:400,letterSpacing:"0.01em"}}>Plataforma de pagamentos</div>
        </div>
      </div>
      <div style={{width:"100%",maxWidth:380,padding:"24px 24px 48px"}}>
        {step===1&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{color:MUTED,fontSize:11,fontWeight:600,textAlign:"center",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Como você quer entrar?</div>
            {isAdminMode&&(
              <button onClick={()=>{setRole("admin");setStep(2);}} style={{background:CARD,border:`1px solid rgba(212,175,55,0.08)`,borderRadius:18,padding:"18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:44,height:44,borderRadius:14,background:`${GOLD}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,fontFamily:SF,fontWeight:700,color:GOLD}}>⊞</div>
                <div>
                  <div style={{color:TEXT,fontFamily:SF,fontWeight:700,fontSize:15}}>Admin</div>
                  <div style={{color:MUTED,fontFamily:F,fontSize:12,marginTop:2}}>Painel JosephPay completo</div>
                  <span style={{background:`${GOLD}14`,color:GOLD,border:`1px solid ${GOLD}28`,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,display:"inline-block",marginTop:6}}>Acesso total</span>
                </div>
              </button>
            )}
            <button onClick={()=>{setRole("client");setStep(2);}} style={{background:CARD,border:`1px solid rgba(212,175,55,0.08)`,borderRadius:18,padding:"18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:44,height:44,borderRadius:14,background:CARD2,border:`1px solid ${BDR}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,color:MUTED}}>◈</div>
              <div>
                <div style={{color:TEXT,fontFamily:SF,fontWeight:700,fontSize:15}}>Sou produtor</div>
                <div style={{color:MUTED,fontFamily:F,fontSize:12,marginTop:2}}>Acesse seu painel de vendas</div>
                <span style={{background:"rgba(255,255,255,0.06)",color:MUTED,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,display:"inline-block",marginTop:6}}>Produtor</span>
              </div>
            </button>
            <button onClick={()=>{setRole("afiliado");setStep(2);}} style={{background:CARD,border:`1px solid rgba(212,175,55,0.08)`,borderRadius:18,padding:"18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:44,height:44,borderRadius:14,background:CARD2,border:`1px solid ${BDR}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,color:MUTED}}>⊙</div>
              <div>
                <div style={{color:TEXT,fontFamily:SF,fontWeight:700,fontSize:15}}>Sou afiliado</div>
                <div style={{color:MUTED,fontFamily:F,fontSize:12,marginTop:2}}>Acompanhe suas comissões</div>
                <span style={{background:"rgba(255,255,255,0.06)",color:MUTED,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,display:"inline-block",marginTop:6}}>Afiliado</span>
              </div>
            </button>
          </div>
        )}
        {step===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:MUTED,fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:600,fontFamily:F}}>← Voltar</button>
            <div style={{background:CARD,border:`1px solid ${role==="admin"?GOLD+"35":BDR}`,borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:2}}>
              <div style={{width:40,height:40,borderRadius:12,background:role==="admin"?GOLD:CARD2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:role==="admin"?16:18,color:role==="admin"?"#0A0A0A":MUTED,flexShrink:0}}>{role==="admin"?"J":role==="afiliado"?"⊙":"◈"}</div>
              <div>
                <div style={{color:TEXT,fontWeight:700,fontSize:14}}>{role==="admin"?"Admin · JosephPay":role==="afiliado"?"Painel do afiliado":"Painel do produtor"}</div>
                <div style={{color:MUTED,fontSize:12,marginTop:2}}>{role==="admin"?"Acesso completo":role==="afiliado"?"Comissões e links":"Suas vendas e receitas"}</div>
              </div>
            </div>
            {[{l:"E-mail",p:role==="admin"?"admin@josephpay.com":"seu@email.com",t:"email"},{l:"Senha",p:"••••••••",t:"password"}].map(f=>(
              <div key={f.l}>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>{f.l}</div>
                <input type={f.t} placeholder={f.p} value={f.t==="email"?email:pass} onChange={e=>f.t==="email"?setEmail(e.target.value):setPass(e.target.value)} style={{width:"100%",background:CARD,border:`1px solid ${BDR}`,borderRadius:14,padding:"13px 15px",color:TEXT,fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
            ))}
            <div style={{textAlign:"right"}}><span onClick={doReset} style={{color:GOLD,fontSize:12,fontWeight:600,cursor:"pointer"}}>{resetSent?"✓ E-mail enviado!":"Esqueci a senha"}</span></div>
            {error&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"10px 14px",color:RED,fontSize:13,fontWeight:500}}>{error}</div>}
            <button onClick={doLogin} disabled={loading} style={{background:loading?"rgba(212,175,55,0.5)":GOLD,border:"none",borderRadius:100,padding:"16px",color:"#0C0C0C",fontWeight:600,fontSize:15,cursor:loading?"not-allowed":"pointer",fontFamily:F,letterSpacing:"0.01em",transition:"background 0.2s"}}>{loading?"Entrando…":"Entrar →"}</button>
            {!_sb&&<div style={{textAlign:"center",background:"rgba(212,175,55,0.06)",border:`1px solid ${GOLD}20`,borderRadius:10,padding:"8px 12px",color:MUTED,fontSize:11}}>Modo demonstração · Configure o Supabase para acesso real</div>}
            <div style={{textAlign:"center",color:MUTED,fontSize:11}}>🔒 Acesso seguro · JosephPay</div>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [booting,setBooting]=useState(true);

  useEffect(()=>{
    if(_sb){
      // Supabase configurado → restaura sessão real
      _sb.auth.getSession().then(({data:{session}})=>{
        if(session){
          const m=session.user.user_metadata||{};
          setUser({role:m.role||"client",name:m.name||session.user.email.split("@")[0],email:session.user.email,id:session.user.id});
        }
        setBooting(false);
      });
      const{data:{subscription}}=_sb.auth.onAuthStateChange((_ev,session)=>{
        if(!session)setUser(null);
      });
      return()=>subscription.unsubscribe();
    } else {
      // Sem Supabase → usa localStorage para persistência de demo
      try{const s=localStorage.getItem("jp_session");if(s)setUser(JSON.parse(s));}catch(e){}
      setBooting(false);
    }
  },[]);

  const handleLogin=(u)=>{
    setUser(u);
    if(!_sb)localStorage.setItem("jp_session",JSON.stringify(u));
  };
  const handleLogout=()=>{
    setUser(null);
    if(_sb)_sb.auth.signOut();
    else localStorage.removeItem("jp_session");
  };

  if(booting)return(
    <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:28}}>Joseph<span style={{color:GOLD}}>Pay</span></div>
      <div style={{width:32,height:32,border:`3px solid ${GOLD}30`,borderTop:`3px solid ${GOLD}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:F}}>
      {!user&&<Login onLogin={handleLogin}/>}
      {user?.role==="admin"&&<AdminPanel onLogout={handleLogout}/>}
      {(user?.role==="client"||user?.role==="afiliado")&&<ClientPanel clientName={user.name} userEmail={user.email} onLogout={handleLogout}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
