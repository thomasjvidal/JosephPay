<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JosephPay</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#131312;color:#E5E2E0}
body{font-family:'Inter',system-ui,sans-serif}
input::placeholder,textarea::placeholder{color:rgba(153,144,124,0.6)}
textarea{resize:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.2);border-radius:4px}
.jp-sidebar{position:fixed;left:0;top:0;height:100%;width:68px;z-index:50;background:rgba(19,19,18,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid rgba(212,175,55,0.08);display:flex;flex-direction:column;transition:width 0.25s cubic-bezier(0.4,0,0.2,1)}
@media(min-width:900px){.jp-sidebar{width:230px}.jp-sidebar .lbl{display:block!important}.jp-sidebar .logo-text{display:block!important}}
.jp-main{margin-left:68px;min-height:100vh}
@media(min-width:900px){.jp-main{margin-left:230px}}
@media(max-width:639px){.jp-sidebar{display:none}.jp-main{margin-left:0;padding-bottom:80px}.jp-bnav{display:flex!important}}
.jp-bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(19,19,18,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(212,175,55,0.08);padding:10px 0 22px;justify-content:flex-start;align-items:center;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}.jp-bnav::-webkit-scrollbar{display:none}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:640px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.jp-gold-card{background:linear-gradient(135deg,#9A6E20 0%,#C9953F 20%,#E8C86A 42%,#D4A848 62%,#A07228 82%,#C09040 100%);border-radius:22px;position:relative;overflow:hidden;min-height:180px}
.jp-gold-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.22) 0%,transparent 45%,rgba(0,0,0,0.08) 100%);pointer-events:none}
.jp-sunburst{position:relative;overflow:hidden}
.jp-sunburst::after{content:'';position:absolute;top:-80%;left:50%;transform:translateX(-50%);width:220%;height:220%;background:conic-gradient(from 180deg at 50% 0%,transparent 0deg,rgba(212,175,55,0.07) 4deg,transparent 8deg,rgba(212,175,55,0.05) 12deg,transparent 16deg,rgba(212,175,55,0.06) 20deg,transparent 24deg,rgba(212,175,55,0.04) 28deg,transparent 32deg,rgba(212,175,55,0.07) 36deg,transparent 40deg,rgba(212,175,55,0.05) 44deg,transparent 48deg,rgba(212,175,55,0.06) 52deg,transparent 56deg,rgba(212,175,55,0.04) 60deg,transparent 64deg,rgba(212,175,55,0.07) 68deg,transparent 72deg,rgba(212,175,55,0.05) 76deg,transparent 80deg,rgba(212,175,55,0.06) 84deg,transparent 88deg,transparent 270deg,rgba(212,175,55,0.06) 274deg,transparent 278deg,rgba(212,175,55,0.05) 282deg,transparent 286deg,rgba(212,175,55,0.07) 290deg,transparent 294deg,rgba(212,175,55,0.04) 298deg,transparent 302deg,rgba(212,175,55,0.06) 306deg,transparent 310deg,rgba(212,175,55,0.05) 314deg,transparent 318deg,rgba(212,175,55,0.07) 322deg,transparent 326deg,rgba(212,175,55,0.04) 330deg,transparent 334deg,rgba(212,175,55,0.06) 338deg,transparent 342deg,rgba(212,175,55,0.05) 346deg,transparent 350deg,rgba(212,175,55,0.07) 354deg,transparent 358deg,transparent 360deg);pointer-events:none;z-index:0}
.jp-sunburst>*{position:relative;z-index:1}
.jp-glass{background:rgba(19,19,18,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.jp-gold-gradient{background:linear-gradient(135deg,#D4AF37 0%,#F2CA50 50%,#D4AF37 100%)}
.jp-gold-text{background:linear-gradient(135deg,#F2CA50 0%,#D4AF37 60%,#F2CA50 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.jp-promo-card{background:#1C1C1A;border-radius:24px;overflow:hidden;position:relative;min-height:140px}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;
const {AreaChart,Area,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid,BarChart,Bar}=Recharts;

const GOLD="#D4AF37", GOLD2="#F2CA50", GREEN="#22C55E", RED="#EF4444", BLUE="#5B8DEF";
const BG="#131312", CARD="#1C1C1A", CARD2="#20201E", CARD3="#2A2A29";
const BDR="rgba(255,255,255,0.06)", MUTED="#99907C", TEXT="#E5E2E0";
const F="'Inter',system-ui,sans-serif", SF="'Newsreader',Georgia,serif";

const mkData=(n,base,variance)=>Array.from({length:n},(_,i)=>({i,v:Math.max(0,base+Math.floor((Math.random()-0.4)*variance))}));
const PERIODS={
  hoje:{data:mkData(8,320,300).map((d,i)=>({...d,label:`${8+i}h`})),label:"Hoje"},
  semana:{data:mkData(7,800,700).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]})),label:"Esta semana"},
  mes:{data:mkData(30,600,800).map((d,i)=>({...d,label:i+1})),label:"Este mês"},
  trimestre:{data:mkData(12,2000,2000).map((d,i)=>({...d,label:`S${i+1}`})),label:"Trimestre"},
  ano:{data:mkData(12,8000,6000).map((d,i)=>({...d,label:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][i]})),label:"Ano"},
};

function Tag({status}){
  if(status==="pago") return <span style={{fontSize:10,fontWeight:600,color:"#22C55E",letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  if(status==="pendente") return <span style={{fontSize:10,fontWeight:600,color:MUTED,letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  if(status==="estornado") return <span style={{fontSize:10,fontWeight:600,color:RED,letterSpacing:"0.06em",textTransform:"uppercase"}}>{status}</span>;
  const m={cancelado:{bg:"rgba(255,68,68,0.1)",tx:RED,bd:"rgba(255,68,68,0.2)"},ativo:{bg:`${GOLD}18`,tx:GOLD,bd:`${GOLD}30`},inativo:{bg:"rgba(255,68,68,0.1)",tx:RED,bd:"rgba(255,68,68,0.2)"}};
  const s=m[status]||{bg:"rgba(255,255,255,0.07)",tx:MUTED,bd:BDR};
  return <span style={{background:s.bg,color:s.tx,border:`1px solid ${s.bd}`,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,letterSpacing:"0.06em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{status}</span>;
}

function KPICard({label,value,sub,accent,icon}){
  const c=accent||GOLD;
  return(
    <div style={{background:CARD,border:`1px solid rgba(212,175,55,0.06)`,borderRadius:16,padding:"20px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <span style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.09em",textTransform:"uppercase",fontFamily:F}}>{label}</span>
        <span style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${c}30`,background:`${c}0D`,display:"flex",alignItems:"center",justifyContent:"center",color:c,fontSize:12,flexShrink:0}}>{icon}</span>
      </div>
      <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:20,letterSpacing:"-0.01em"}}>{value}</div>
      {sub&&<div style={{color:MUTED,fontSize:11,marginTop:5,fontFamily:F}}>{sub}</div>}
    </div>
  );
}

function Pill({label,value,accent,sub}){
  return(
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:18,padding:"18px 16px",flex:1,minWidth:0}}>
      <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>{label}</div>
      <div style={{color:accent||TEXT,fontSize:20,fontWeight:800,letterSpacing:"-0.03em"}}>{value}</div>
      {sub&&<div style={{color:MUTED,fontSize:11,marginTop:4}}>{sub}</div>}
    </div>
  );
}

function Btn({children,onClick,color,outline,sm}){
  const c=color||GOLD;
  return(
    <button onClick={onClick} style={{background:outline?"transparent":c,border:`1.5px solid ${outline?c+"70":"transparent"}`,borderRadius:100,padding:sm?"8px 22px":"15px 28px",color:outline?c:(c===GOLD?"#0C0C0C":TEXT),fontWeight:600,fontSize:sm?13:14,cursor:"pointer",width:(outline||sm)?"auto":"100%",fontFamily:F,letterSpacing:"0.01em"}}>
      {children}
    </button>
  );
}

function AdvancedChart({accent=GOLD}){
  const [period,setPeriod]=useState("semana");
  const pd=PERIODS[period];
  const total=pd.data.reduce((a,d)=>a+d.v,0);
  const gid=`g-${period}-${accent.replace("#","")}`;
  return(
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"22px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{color:MUTED,fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6,fontFamily:F}}>{pd.label}</div>
          <div style={{color:accent,fontFamily:SF,fontWeight:600,fontSize:30,letterSpacing:"-0.01em"}}>R$ {total.toLocaleString()}</div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {Object.keys(PERIODS).map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 11px",borderRadius:100,border:`1px solid ${p===period?accent+"50":BDR}`,background:p===period?`${accent}15`:"transparent",color:p===period?accent:MUTED,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F}}>{p}</button>
          ))}
        </div>
      </div>
      <div style={{height:120}}>
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={pd.data} margin={{top:4,right:4,left:-32,bottom:0}}>
            <defs>
              <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={accent} stopOpacity={0.18}/>
                <stop offset="100%" stopColor={accent} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.03)" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:MUTED,fontSize:9,fontFamily:F}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
            <YAxis hide/>
            <Tooltip contentStyle={{background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,color:"#fff",fontSize:12,fontFamily:F}} formatter={v=>[`R$ ${v.toLocaleString()}`,"Receita"]} labelStyle={{color:MUTED,fontSize:10}}/>
            <Area type="monotone" dataKey="v" stroke={accent} strokeWidth={2} fill={`url(#${gid})`} dot={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function VisitorChart(){
  const data=mkData(7,120,150).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]}));
  return(
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"20px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{color:TEXT,fontWeight:700,fontSize:14}}>Visitantes</div>
          <div style={{color:MUTED,fontSize:12,marginTop:2}}>josephpay.com</div>
        </div>
        <span style={{background:`${GOLD}15`,color:GOLD,border:`1px solid ${GOLD}28`,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20}}>{data.reduce((a,d)=>a+d.v,0)} visitas</span>
      </div>
      <div style={{height:90}}>
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={data} margin={{top:4,right:4,left:-32,bottom:0}}>
            <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.03)" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:MUTED,fontSize:9,fontFamily:F}} axisLine={false} tickLine={false}/>
            <YAxis hide/>
            <Tooltip contentStyle={{background:CARD2,border:`1px solid ${BDR}`,borderRadius:12,color:"#fff",fontSize:12,fontFamily:F}} formatter={v=>[v+" visitantes",""]}/>
            <Bar dataKey="v" fill={`${GOLD}66`} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{display:"flex",gap:20,marginTop:14}}>
        {[{l:"Sessões",v:"847",c:TEXT},{l:"Conversão",v:"2.3%",c:GOLD},{l:"Rejeição",v:"38%",c:TEXT}].map(k=>(
          <div key={k.l}>
            <div style={{color:k.c,fontWeight:700,fontSize:15}}>{k.v}</div>
            <div style={{color:MUTED,fontSize:11,marginTop:2}}>{k.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const QQ=["📊 Vendas hoje?","💰 Receita da semana?","🔗 Gerar link de afiliado","📈 Minha conversão?","❓ Configurar checkout","🆘 Suporte"];
const AR={"📊 Vendas hoje?":"Hoje você teve 4 vendas totalizando R$ 1.240. Melhor hora: 14h com R$ 480. +18% acima da média! 🚀","💰 Receita da semana?":"Esta semana você recebeu R$ 7.270 líquidos. Quarta foi seu melhor dia.","🔗 Gerar link de afiliado":"Seu link: josephpay.com/ref/SEU_CODIGO — já ativo! Cada venda gera comissão automática.","📈 Minha conversão?":"Sua conversão atual é 2.3%. Média do mercado: 1.5-3%. Você está bem posicionado!","❓ Configurar checkout":"Vá em Templates, escolha o modelo, preencha produto e valor e clique Criar.","🆘 Suporte":"Me conta o que aconteceu. Contato: suporte@josephpay.com"};

function ChatIA({productName}){
  const [msgs,setMsgs]=useState([{role:"ai",text:`Olá! Sou a IA da JosephPay. Estou aqui pra te ajudar com "${productName||"seu produto"}". O que precisa?`}]);
  const [input,setInput]=useState("");
  const [showQ,setShowQ]=useState(true);
  const bottom=useRef(null);
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  const send=(text)=>{
    const msg=text||input;if(!msg.trim())return;
    setInput("");setShowQ(false);
    setMsgs(p=>[...p,{role:"user",text:msg}]);
    setTimeout(()=>{
      const reply=AR[msg]||"Entendi! Em breve conectado à IA real via API. Posso ajudar com dúvidas sobre vendas e afiliados!";
      setMsgs(p=>[...p,{role:"ai",text:reply}]);
    },600);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)",minHeight:380}}>
      <div style={{background:`${GREEN}0D`,border:`1px solid ${GREEN}25`,borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:GREEN,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:MUTED,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Site ativo</div>
          <div style={{color:TEXT,fontSize:13,fontWeight:600}}>protocolog9.josephpay.com</div>
        </div>
        <span style={{background:`${GREEN}15`,color:GREEN,border:`1px solid ${GREEN}28`,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>Online</span>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="ai"&&<div style={{width:30,height:30,borderRadius:10,background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#0A0A0A",flexShrink:0,marginRight:8,marginTop:2}}>J</div>}
            <div style={{maxWidth:"76%",padding:"11px 15px",borderRadius:16,fontSize:13,lineHeight:1.55,background:m.role==="user"?`${GOLD}18`:"rgba(255,255,255,0.05)",color:TEXT,border:`1px solid ${m.role==="user"?GOLD+"30":BDR}`}}>{m.text}</div>
          </div>
        ))}
        {showQ&&(
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
            <div style={{color:MUTED,fontSize:11,marginBottom:2}}>Perguntas rápidas:</div>
            {QQ.map(q=>(
              <button key={q} onClick={()=>send(q)} style={{textAlign:"left",padding:"10px 14px",borderRadius:12,background:CARD,border:`1px solid ${BDR}`,color:"rgba(255,255,255,0.75)",fontSize:13,cursor:"pointer",fontWeight:500,fontFamily:F}}>{q}</button>
            ))}
          </div>
        )}
        <div ref={bottom}/>
      </div>
      <div style={{display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Mensagem..." style={{flex:1,background:CARD,border:`1px solid ${BDR}`,borderRadius:14,padding:"13px 16px",color:TEXT,fontSize:14,outline:"none",fontFamily:F}}/>
        <button onClick={()=>send()} style={{width:46,height:46,borderRadius:14,background:GOLD,border:"none",color:"#0A0A0A",fontSize:18,cursor:"pointer",fontWeight:900,flexShrink:0}}>→</button>
      </div>
    </div>
  );
}

function Afiliados({isAdmin}){
  const list=[
    {name:"Carlos M.",code:"CARLOS10",vendas:12,comissao:"R$ 216,00",status:"ativo",cli:"Renato G9",cliques:124,conv:"9.7%"},
    {name:"Fernanda R.",code:"FER20",vendas:8,comissao:"R$ 144,00",status:"ativo",cli:"Dra. Deise",cliques:98,conv:"8.2%"},

    {name:"Ana P.",code:"ANA30",vendas:6,comissao:"R$ 108,00",status:"ativo",cli:"Dr. Chayenne",cliques:67,conv:"9.0%"},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {isAdmin?(
        <>
          <div className="kpi-grid">
            <KPICard label="Total afiliados" value="9" accent={GOLD} icon="◉"/>
            <KPICard label="Comissão total" value="R$ 522" sub="este mês" accent={GOLD} icon="◈"/>
            <KPICard label="Cliques totais" value="331" accent={GOLD} icon="◎"/>
            <KPICard label="Conversão média" value="8.5%" accent={GOLD} icon="⊕"/>
          </div>
          <div className="jp-promo-card" style={{marginBottom:12}}>
            <div style={{position:"absolute",top:0,right:0,width:"45%",height:"100%"}}>
              <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGkuyzZnqoUM08agRXlkrfxyMPG1tGTOsGJ-31vPSQjy3rEEHMBFLq2ZLNqvyvHLkkTTYW-_hLzpuoBRJTrvv4xSSGB-jp3sbsOFDReLicp6zd81gmzD9BwYODCdJPBXvM2_GVLDhTvSbz4JL8gWYb4wMHdhb7NIrK8bm9KwT90lqkusGrmpiu97ip26oz_yQjoLrQB-6d84oW1NYU6dSKW2_4wfU_YMoZsy5I6jBpdbdPI2oUjKs7A_e065DuDo1ss2lfiD1la8c" alt="asset" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.5,mixBlendMode:"luminosity"}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to right, #1C1C1A 0%, transparent 60%)"}}/>
            </div>
            <div style={{position:"relative",zIndex:1,padding:"20px 18px",maxWidth:"60%"}}>
              <div style={{color:GOLD,fontFamily:SF,fontSize:12,fontStyle:"italic",marginBottom:6}}>Programa de Afiliados</div>
              <div style={{color:TEXT,fontSize:15,fontWeight:600,lineHeight:1.3,marginBottom:10}}>Cresça sua rede e aumente suas comissões</div>
              <button style={{background:"transparent",border:"none",color:GOLD,fontFamily:F,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",padding:0}}>Saiba mais →</button>
            </div>
          </div>
          <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
            <div style={{padding:"16px 18px",borderBottom:`1px solid ${BDR}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:TEXT,fontWeight:700,fontSize:14}}>Todos os afiliados</span>
              <Btn sm outline color={GOLD}>+ Convidar</Btn>
            </div>
            {list.map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:i<list.length-1?`1px solid ${BDR}`:"none"}}>

  const [role,setRole]=useState(null);
  const [client,setClient]=useState(null);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [step,setStep]=useState(1);
  const CLIENTS=[{name:"Renato G9",email:"renato@g9.com"},{name:"Dra. Deise",email:"deise@clinica.com"}];
  const doLogin=()=>{
    if(!email||!pass)return;
    if(role==="admin")onLogin({role:"admin",name:"Joseph"});
    else onLogin({role:"client",name:client?.name||"Cliente"});
  };
  return(
    <div style={{background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:0}}>
      <div style={{width:"100%",maxWidth:480,position:"relative",height:220,overflow:"hidden",flexShrink:0}}>
        <img src="https://lh3.googleusercontent.com/aida/ADBb0ui29YkiDkpyVsa9cfDW1krB1rl3sJe4LIrwmUN7XXuSNf0FVDlU5_tiy8xNQs0Np_sBlOJ9DnC8A0_O-mHBYAGqSywt3vaQYmg6D-8mR3tn0exgefotG5yi5iutGI-TwB2B4q4TzyZ-uHytHMMfzWCoMGG2BCcyVUkYaQst25yKYp8gv3e1Mxr9LiQSRJnqf1XUSknfmoieMBjC5zlEsHt_44f-DmsB42fhshzmyOhUU7nn5F8EnVRWJvnEwXCksKp5N3aZwIdPEA" alt="JosephPay" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.55,mixBlendMode:"luminosity"}}/>
        <div style={{position:"absolute",inset:0,background:`linear-gradient(to bottom, transparent 0%, ${BG} 100%)`}}/>
        <div style={{position:"absolute",bottom:24,left:0,right:0,textAlign:"center"}}>
          <div style={{width:64,height:64,borderRadius:20,background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:SF,fontWeight:700,fontSize:28,color:"#0C0C0C",margin:"0 auto 14px",boxShadow:`0 0 60px ${GOLD}40`}}>J</div>
          <div style={{color:TEXT,fontFamily:SF,fontWeight:600,fontSize:36,letterSpacing:"-0.01em",lineHeight:1.1}}>Joseph<span style={{color:GOLD}}>Pay</span></div>
          <div style={{width:40,height:1,background:`linear-gradient(90deg,transparent,${GOLD}80,transparent)`,margin:"12px auto"}}/>
          <div style={{color:MUTED,fontSize:13,fontFamily:F,fontWeight:400,letterSpacing:"0.01em"}}>Plataforma de pagamentos</div>
        </div>
      </div>
      <div style={{width:"100%",maxWidth:380,padding:"24px 24px 48px"}}>
        {step===1&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{color:MUTED,fontSize:11,fontWeight:600,textAlign:"center",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Como você quer entrar?</div>
            <button onClick={()=>{setRole("admin");setStep(2);}} style={{background:CARD,border:`1px solid rgba(212,175,55,0.08)`,borderRadius:18,padding:"18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:44,height:44,borderRadius:14,background:`${GOLD}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,fontFamily:SF,fontWeight:700,color:GOLD}}>⊞</div>
              <div>
                <div style={{color:TEXT,fontFamily:SF,fontWeight:700,fontSize:15}}>Sou o dono — Admin</div>
                <div style={{color:MUTED,fontFamily:F,fontSize:12,marginTop:2}}>Painel JosephPay completo</div>
                <span style={{background:`${GOLD}14`,color:GOLD,border:`1px solid ${GOLD}28`,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,display:"inline-block",marginTop:6}}>Acesso total</span>
              </div>
            </button>
            {CLIENTS.map(c=>(
              <button key={c.name} onClick={()=>{setRole("client");setClient(c);setStep(2);}} style={{background:CARD,border:`1px solid rgba(212,175,55,0.08)`,borderRadius:18,padding:"16px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:44,height:44,borderRadius:14,background:CARD2,border:`1px solid ${BDR}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:SF,fontWeight:800,fontSize:18,color:MUTED,flexShrink:0}}>{c.name[0]}</div>
                <div>
                  <div style={{color:TEXT,fontFamily:SF,fontWeight:700,fontSize:15}}>{c.name}</div>
                  <div style={{color:MUTED,fontFamily:F,fontSize:12,marginTop:2}}>{c.email}</div>
                  <span style={{background:"rgba(255,255,255,0.06)",color:MUTED,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,display:"inline-block",marginTop:6}}>Produtor</span>
                </div>
              </button>
            ))}
          </div>
        )}
        {step===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:MUTED,fontSize:13,cursor:"pointer",textAlign:"left",fontWeight:600,fontFamily:F}}>← Voltar</button>
            <div style={{background:CARD,border:`1px solid ${role==="admin"?GOLD+"35":BDR}`,borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:2}}>
              <div style={{width:40,height:40,borderRadius:12,background:role==="admin"?GOLD:CARD2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:role==="admin"?"#0A0A0A":MUTED,flexShrink:0}}>{role==="admin"?"J":client?.name?.[0]}</div>
              <div>
                <div style={{color:TEXT,fontWeight:700,fontSize:14}}>{role==="admin"?"Admin · JosephPay":client?.name}</div>
                <div style={{color:MUTED,fontSize:12,marginTop:2}}>{role==="admin"?"Acesso completo":"Painel do produtor"}</div>
              </div>
            </div>
            {[{l:"E-mail",p:role==="admin"?"admin@josephpay.com":client?.email,t:"email"},{l:"Senha",p:"••••••••",t:"password"}].map(f=>(
              <div key={f.l}>
                <div style={{color:MUTED,fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>{f.l}</div>
                <input type={f.t} placeholder={f.p} value={f.t==="email"?email:pass} onChange={e=>f.t==="email"?setEmail(e.target.value):setPass(e.target.value)} style={{width:"100%",background:CARD,border:`1px solid ${BDR}`,borderRadius:14,padding:"13px 15px",color:TEXT,fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
            ))}
            <div style={{textAlign:"right"}}><span style={{color:GOLD,fontSize:12,fontWeight:600,cursor:"pointer"}}>Esqueci a senha</span></div>
            <button onClick={doLogin} style={{background:GOLD,border:"none",borderRadius:100,padding:"16px",color:"#0C0C0C",fontWeight:600,fontSize:15,cursor:"pointer",fontFamily:F,letterSpacing:"0.01em"}}>Entrar →</button>
            <div style={{textAlign:"center",color:MUTED,fontSize:11}}>🔒 Acesso seguro · JosephPay</div>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:F}}>
      {!user&&<Login onLogin={setUser}/>}
      {user?.role==="admin"&&<AdminPanel onLogout={()=>setUser(null)}/>}
      {user?.role==="client"&&<ClientPanel clientName={user.name} onLogout={()=>setUser(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
